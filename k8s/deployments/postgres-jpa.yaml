# PostgreSQL Database for JPA
apiVersion: v1
kind: Service
metadata:
  name: postgres-jpa
  namespace: acme-apps
spec:
  selector:
    app: postgres-jpa
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-jpa
  namespace: acme-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-jpa
  template:
    metadata:
      labels:
        app: postgres-jpa
    spec:
      containers:
      - name: postgres
        image: postgres:17-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: "acme_jpa"
        - name: POSTGRES_USER
          value: "acme_user"
        - name: POSTGRES_PASSWORD
          value: "acme_password"
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U acme_user -d acme_jpa
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U acme_user -d acme_jpa
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: postgres-data
        emptyDir: {}
