apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: acme-ingress
  namespace: acme-apps
  annotations:
    # Enable client certificate authentication
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "2"
    nginx.ingress.kubernetes.io/auth-tls-secret: "acme-apps/ca-chain-secret"
    nginx.ingress.kubernetes.io/auth-tls-verify-client-optional: "true"
    nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "true"
    # Add SSL client certificate DN headers for backend services
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header ssl-client-subject-dn $ssl_client_s_dn;
      proxy_set_header ssl-client-issuer-dn $ssl_client_i_dn;
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - acme.local
    secretName: ingress-tls-secret
  rules:
  - host: acme.local
    http:
      paths:
      - path: /test
        pathType: Prefix
        backend:
          service:
            name: test-headers-service
            port:
              number: 8080
      # Route /api/v1/* to the backend API
      # Note: /api/* without v1 goes to the UI (Next.js API routes)
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: api-mvc
            port:
              number: 8080
      - path: /api-webflux/v1
        pathType: Prefix
        backend:
          service:
            name: api-webflux
            port:
              number: 8081
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ui
            port:
              number: 3001
