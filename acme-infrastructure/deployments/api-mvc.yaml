# MVC API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-mvc
  namespace: acme-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-mvc
  template:
    metadata:
      labels:
        app: api-mvc
    spec:
      containers:
      - name: api-mvc
        image: acme-api-mvc:latest
        imagePullPolicy: Never  # Use local image (built with minikube docker-env)
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-jpa:5432/acme_jpa"
        - name: SPRING_DATASOURCE_USERNAME
          value: "acme_user"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "acme_password"
        - name: AUTH_SERVICE_BASE_URL
          value: "https://auth-service-db:8082"
        - name: LOG_DIR
          value: "/tmp/logs"
        # Create logs directory before starting
        command: ["/bin/sh", "-c", "mkdir -p /tmp/logs && exec java -jar app.jar"]
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
---
# MVC API Service
apiVersion: v1
kind: Service
metadata:
  name: api-mvc
  namespace: acme-apps
spec:
  selector:
    app: api-mvc
  ports:
  - port: 8080
    targetPort: 8080
    name: http
