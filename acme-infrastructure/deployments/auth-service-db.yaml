# Auth Service (Database) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-db
  namespace: acme-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service-db
  template:
    metadata:
      labels:
        app: auth-service-db
    spec:
      containers:
      - name: auth-service-db
        image: acme-auth-service-db:latest
        imagePullPolicy: Never  # Use local image (built with minikube docker-env)
        ports:
        - containerPort: 8082
          name: http
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-auth:5432/acme_auth"
        - name: SPRING_DATASOURCE_USERNAME
          value: "acme_user"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "acme_password"
        - name: LOG_DIR
          value: "/tmp/logs"
        # Create logs directory before starting
        command: ["/bin/sh", "-c", "mkdir -p /tmp/logs && exec java -jar app.jar"]
        livenessProbe:
          # Use TCP socket probe since HTTP probe can't provide client cert for mTLS
          tcpSocket:
            port: 8082
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          # Use TCP socket probe since HTTP probe can't provide client cert for mTLS
          # This verifies the service is listening on port 8082
          tcpSocket:
            port: 8082
          initialDelaySeconds: 60
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
# Auth Service (Database) Service
apiVersion: v1
kind: Service
metadata:
  name: auth-service-db
  namespace: acme-apps
spec:
  selector:
    app: auth-service-db
  ports:
  - port: 8082
    targetPort: 8082
    name: http
